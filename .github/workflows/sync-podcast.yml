name: Sync podcast episodes & build pages

on:
  schedule:
    # Episode publiseres ~03:00 UTC (05:00 norsk sommer / 04:00 norsk vinter).
    # Tre cron-uttrykk med skjeve minutter for redundans — GH Actions schedule
    # blir ofte 15–60 min forsinket, og noen ganger droppet helt på hele timer.
    # Sync er idempotent (committer bare hvis RSS har endret seg), så ekstra
    # kjøringer koster ingenting. Verst case live ~07:30 norsk sommer.
    - cron: '13 4 * * *'   # 04:13 UTC = 06:13 norsk sommer / 05:13 norsk vinter (primary)
    - cron: '43 4 * * *'   # 04:43 UTC = backup +30 min
    - cron: '17 5 * * *'   # 05:17 UTC = backup +1 t
  workflow_dispatch:
  push:
    paths:
      - 'feed.config.json'
      - 'data/campaign.json'
      - 'assets/episode.css'
      - '.github/scripts/sync-podcast.mjs'
      - '.github/scripts/build-episode-pages.mjs'
      - '.github/scripts/generate-og-images.mjs'
      - '.github/scripts/generate-cover-images.mjs'
      - '.github/scripts/generate-sitemap.mjs'
      - '.github/scripts/package.json'
      - '.github/workflows/sync-podcast.yml'

permissions:
  contents: write

concurrency:
  group: sync-podcast
  cancel-in-progress: false

env:
  # Opt inn til Node.js 24 før det blir tvunget i juni 2026
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install deps
        working-directory: .github/scripts
        run: npm install --no-audit --no-fund

      - name: Run sync
        run: node .github/scripts/sync-podcast.mjs

      - name: Build episode pages
        run: node .github/scripts/build-episode-pages.mjs

      - name: Generate cover-images (resized WebP)
        run: node .github/scripts/generate-cover-images.mjs

      - name: Locate Chrome for Puppeteer
        continue-on-error: true  # Chrome er kun for OG-images; episode-publisering skal aldri blokkeres av dette
        run: |
          # GitHub-runneren har Google Chrome forhåndsinstallert. Puppeteers EGEN nedlasting
          # av Chrome 148 har vært kronisk ustabil — den lager mappa linux-148.../ uten selve
          # binæren (skjer til og med under `npm install`s postinstall), og `puppeteer browsers
          # install` returnerer 0 uten å faktisk laste ned. Det etterlot ep. 027–029 uten
          # OG-bilde. Vi dropper derfor nedlastingen helt og peker puppeteer på systemets Chrome.
          path="$(command -v google-chrome || command -v google-chrome-stable || command -v chromium-browser || command -v chromium || true)"
          if [ -n "$path" ]; then
            echo "Bruker system-Chrome: $path ($("$path" --version 2>/dev/null || echo 'ukjent versjon'))"
            echo "PUPPETEER_EXECUTABLE_PATH=$path" >> "$GITHUB_ENV"
          else
            # Siste utvei hvis runner-imaget en dag mangler Chrome: prøv puppeteers nedlasting.
            echo "Fant ikke system-Chrome — faller tilbake til puppeteer-nedlasting."
            (cd .github/scripts && npx puppeteer browsers install chrome) || echo "Chrome-install feilet."
          fi

      - name: Generate OG-images
        continue-on-error: true  # OG-images er nice-to-have, ikke blokker commit hvis Chrome svikter
        run: node .github/scripts/generate-og-images.mjs

      - name: Generate sitemap
        run: node .github/scripts/generate-sitemap.mjs

      - name: Commit changes
        run: |
          git add -A episodes.json 'episode-*' velkommen og covers sitemap.xml 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m "Sync podcast & rebuild episode pages [skip ci]"
          git push

      - name: Verify OG-dekning (sikkerhetsnett — fanger manglende SEO-bilder)
        if: always()  # kjør ALLTID, også om et tidligere steg flaket — dette er nettet
        run: |
          # Sammenlign episode-sidene (bygges pålitelig) mot OG-bildene. Mangler noen,
          # feiler vi SYNLIG (rød run + e-post) så et manglende SEO-bilde aldri kan gå
          # upåaktet hen slik ep. 27-28 gjorde. Episoden er allerede publisert (commit
          # over), så dette blokkerer ingenting — det varsler bare.
          missing=""
          for d in episode-* velkommen; do
            [ -d "$d" ] || continue
            [ -f "og/$d.png" ] || missing="$missing $d"
          done
          if [ -n "$missing" ]; then
            echo "::error::OG/SEO-bilde mangler for:$missing"
            echo "Fiks: re-kjør denne workflowen, eller kjør 'node .github/scripts/generate-og-images.mjs' lokalt."
            exit 1
          fi
          echo "✓ OG-dekning komplett — alle episoder har SEO-bilde."
