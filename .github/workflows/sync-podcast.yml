name: Sync podcast episodes & build pages

on:
  schedule:
    # 06:00 UTC daily (07:00 norsk vintertid / 08:00 sommertid)
    - cron: '0 6 * * *'
  workflow_dispatch:
  push:
    paths:
      - 'feed.config.json'
      - 'data/campaign.json'
      - 'data/resource-links.json'
      - 'assets/episode.css'
      - '.github/scripts/sync-podcast.mjs'
      - '.github/scripts/build-episode-pages.mjs'
      - '.github/workflows/sync-podcast.yml'

permissions:
  contents: write

concurrency:
  group: sync-podcast
  cancel-in-progress: false

env:
  # Opt inn til Node.js 24 før det blir tvunget i juni 2026
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install deps
        working-directory: .github/scripts
        run: npm install --no-audit --no-fund

      - name: Run sync
        run: node .github/scripts/sync-podcast.mjs

      - name: Build episode pages
        run: node .github/scripts/build-episode-pages.mjs

      - name: Commit changes
        run: |
          git add -A episodes.json 'episode-*' velkommen 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m "Sync podcast & rebuild episode pages [skip ci]"
          git push
